<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us - Delicious Restaurant</title>
  <link rel="stylesheet" href="contact.css">
  <style>
    /* Reset */
    
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Contact Us</h1>
      <p>We'd love to hear from you. Reach out for reservations, inquiries, or feedback.</p>
    </header>
    <form>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email address" required>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="Subject" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Your message here" required></textarea>
      </div>
      <button type="submit">Send Message</button>
    </form>
    <div class="contact-info">
      <p><strong>Address:</strong> 123 Delicious Avenue, Flavor Town, USA</p>
      <p><strong>Phone:</strong> (123) 456-7890</p>
      <p><strong>Email:</strong> info@deliciousrestaurant.com</p>
    </div>
  </div>
</body>
</html>
